### 第二步：新增 JavaScript 功能
在你的 `<script>` 標籤內的最下方（例如在 `clearSubmissions()` 函式之後），加入這兩個新函式來處理「下載範例」與「讀取並上傳 JSON」的邏輯：

```javascript
        // 下載 JSON 範例格式，讓老師知道怎麼準備檔案
        function downloadJSONTemplate() {
            const template = [
                {
                    "title": "批次匯入範例題 1 (加法)",
                    "desc": "請撰寫程式印出 5 + 3 的結果",
                    "defaultCode": "# 在這裡寫下你的程式碼\n",
                    "testScript": "import sys\nimport io\n\ncaptured_output = io.StringIO()\nsys.stdout = captured_output\n\ntry:\n{STUDENT_CODE}\nexcept Exception:\n    pass\n\nsys.stdout = sys.__stdout__\nstudent_output = captured_output.getvalue().strip()\n\npassed = 1 if student_output == '8' else 0\nscore = 100 if passed else 0\n\nprint(f'{passed},1,{score}')"
                },
                {
                    "title": "批次匯入範例題 2 (字串)",
                    "desc": "請撰寫程式印出 Hello Python",
                    "defaultCode": "# 在這裡寫下你的程式碼\n",
                    "testScript": "import sys\nimport io\n\ncaptured_output = io.StringIO()\nsys.stdout = captured_output\n\ntry:\n{STUDENT_CODE}\nexcept Exception:\n    pass\n\nsys.stdout = sys.__stdout__\nstudent_output = captured_output.getvalue().strip()\n\npassed = 1 if student_output == 'Hello Python' else 0\nscore = 100 if passed else 0\n\nprint(f'{passed},1,{score}')"
                }
            ];
            
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(template, null, 4));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "problem_template.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // 處理上傳的 JSON 檔案並寫入資料庫
        async function handleImportJSON(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    
                    if (!Array.isArray(importedData)) {
                        alert("匯入失敗：JSON 格式錯誤，最外層必須是一個陣列 (Array) `[ ... ]`。");
                        return;
                    }

                    let successCount = 0;
                    const updates = {};

                    // 驗證每個題目的格式
                    importedData.forEach((prob, index) => {
                        if (prob.title && prob.desc && prob.testScript && prob.testScript.includes('{STUDENT_CODE}')) {
                            prob.defaultCode = prob.defaultCode || "# 在這裡寫下你的程式碼\n";
                            // 產生唯一的 ID，使用時間戳記加上 index 避免重複
                            const pId = 'prob_' + Date.now() + '_' + index; 
                            dbProblems[pId] = prob;
                            updates[pId] = prob;
                            successCount++;
                        } else {
                            console.warn(`第 ${index + 1} 題格式不符，已跳過。確保有 title, desc, testScript 及包含 {STUDENT_CODE}`);
                        }
                    });

                    if (successCount > 0) {
                        // 使用 PATCH 方法，這樣只會把新增的題目加上去，不會覆蓋掉原有題目
                        await fetch(`${FIREBASE_BASE_URL}/problems.json`, { 
                            method: 'PATCH', 
                            body: JSON.stringify(updates) 
                        });
                        alert(`成功匯入 ${successCount} 筆題目！`);
                        renderTeacherProblemList();
                        updateTeacherProblemFilter();
                    } else {
                        alert("未能匯入任何題目。請確認 JSON 內的欄位名稱與測試腳本是否齊全（需包含 {STUDENT_CODE}）。");
                    }
                } catch (err) {
                    console.error("JSON 解析錯誤:", err);
                    alert("匯入失敗：檔案無法解析為正確的 JSON 格式，請檢查是否有語法錯誤。");
                }
                
                // 重設 input 以便下次可以重複選取相同檔案
                event.target.value = '';
            };
            
            reader.readAsText(file);
        }
