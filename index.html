<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python 課堂自動評分系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>
    <style>
        .ace_editor { border-radius: 0.375rem; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen relative pb-10">

    <!-- 頂部導航 -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <!-- 加入 onclick 回到首頁功能 -->
        <h1 class="text-xl font-bold cursor-pointer hover:text-gray-200 transition" onclick="goHome()">Python 課堂練習</h1>
        <button onclick="showTeacherLogin()" class="text-sm opacity-70 hover:opacity-100">老師專區</button>
    </header>

    <main id="app-container" class="max-w-4xl mx-auto p-4 mt-6">
        <div id="loading-view" class="text-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p class="text-gray-600">系統初始化中（正在載入 Python 引擎與資料庫）...</p>
        </div>

        <!-- 1. 學生登入 -->
        <div id="login-view" class="hidden bg-white p-6 rounded-lg shadow-md max-w-md mx-auto">
            <h2 class="text-2xl font-bold mb-4 text-center">進入課堂</h2>
            <div class="space-y-4">
                <div><label class="block text-sm font-medium text-gray-700">班級</label><input type="text" id="student-class" class="mt-1 block w-full border border-gray-300 rounded-md p-2"></div>
                <div><label class="block text-sm font-medium text-gray-700">學號</label><input type="text" id="student-id" class="mt-1 block w-full border border-gray-300 rounded-md p-2"></div>
                <div><label class="block text-sm font-medium text-gray-700">姓名</label><input type="text" id="student-name" class="mt-1 block w-full border border-gray-300 rounded-md p-2"></div>
                <button onclick="loginStudent()" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">登入</button>
            </div>
            <p id="login-error" class="text-red-500 text-sm mt-2 hidden">請填寫所有資料</p>
        </div>

        <!-- 2. 選擇題目 -->
        <div id="problem-select-view" class="hidden bg-white p-6 rounded-lg shadow-md max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">請選擇題目</h2>
                <span class="text-sm bg-gray-200 px-2 py-1 rounded" id="student-info-display-1"></span>
            </div>
            <div id="problem-list" class="space-y-3"></div>
        </div>

        <!-- 3. 學生作答區 -->
        <div id="student-view" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-lg shadow-md">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold" id="problem-title"></h2>
                    <div>
                        <span class="text-sm bg-gray-200 px-2 py-1 rounded mr-2" id="student-info-display-2"></span>
                        <button onclick="showView('problem-select-view')" class="text-blue-600 text-sm hover:underline">返回題目列表</button>
                    </div>
                </div>
                <div class="bg-gray-100 p-4 rounded-md mb-4 whitespace-pre-wrap" id="problem-desc"></div>
                
                <div class="mb-2 flex justify-between text-sm text-gray-600">
                    <span>你的程式碼：</span>
                    <span id="submission-count"></span>
                </div>
                <div id="student-editor" class="w-full h-80 border border-gray-300"></div>
                
                <div class="mt-4 flex justify-between items-center">
                    <button id="submit-btn" onclick="submitCode()" class="bg-green-600 text-white px-6 py-2 rounded-md hover:bg-green-700 transition font-bold">提交測試</button>
                    <div id="result-message" class="font-bold text-lg hidden"></div>
                </div>
            </div>
        </div>

        <!-- 4. 老師專區 -->
        <div id="teacher-view" class="hidden bg-white p-6 rounded-lg shadow-md">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-2xl font-bold">老師專區</h2>
                <div>
                    <button onclick="loadDataAndRender()" class="text-green-600 hover:underline mr-4">重新整理資料</button>
                    <button onclick="showLogin()" class="text-blue-600 hover:underline">登出</button>
                </div>
            </div>

            <div class="flex space-x-4 mb-6">
                <button onclick="switchTeacherTab('grades')" id="tab-btn-grades" class="px-4 py-2 bg-blue-600 text-white rounded-md font-bold">成績監控</button>
                <button onclick="switchTeacherTab('problems')" id="tab-btn-problems" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md font-bold hover:bg-gray-300">題目管理 (出題)</button>
            </div>

            <!-- 成績監控 -->
            <div id="teacher-tab-grades">
                <div class="mb-4 flex items-center space-x-2">
                    <label class="font-bold">選擇要查看的題目成績：</label>
                    <select id="teacher-problem-filter" onchange="renderTeacherTable()" class="border p-2 rounded">
                        <option value="all">全部題目</option>
                    </select>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full bg-white border border-gray-200 text-sm">
                        <thead class="bg-gray-100">
                            <tr>
                                <th class="py-2 px-4 border-b text-left">班級</th>
                                <th class="py-2 px-4 border-b text-left">學號</th>
                                <th class="py-2 px-4 border-b text-left">姓名</th>
                                <th class="py-2 px-4 border-b text-left">題目</th>
                                <th class="py-2 px-4 border-b text-left">最高分數</th>
                                <th class="py-2 px-4 border-b text-left">提交次數</th>
                            </tr>
                        </thead>
                        <tbody id="teacher-table-body"></tbody>
                    </table>
                </div>
                <button onclick="clearSubmissions()" class="mt-4 text-red-600 text-sm hover:underline">清除所有學生成績</button>
            </div>

            <!-- 題目管理 -->
            <div id="teacher-tab-problems" class="hidden space-y-6">
                <div class="bg-gray-50 p-4 rounded border" id="problem-editor-section">
                    <h3 class="text-lg font-bold mb-4" id="editor-form-title">新增題目</h3>
                    <div class="space-y-4">
                        <div><label class="block font-bold mb-1">題目名稱</label><input type="text" id="new-prob-title" class="w-full border p-2 rounded"></div>
                        <div><label class="block font-bold mb-1">題目描述</label><textarea id="new-prob-desc" class="w-full border p-2 rounded h-24"></textarea></div>
                        
                        <div>
                            <label class="block font-bold mb-1">學生預設程式碼</label>
                            <div id="teacher-default-editor" class="w-full h-32 border border-gray-300"></div>
                        </div>
                        <div>
                            <label class="block font-bold mb-1">測試腳本 (Python) - 預設為檢查 print 輸出</label>
                            <p class="text-xs text-gray-500 mb-1">請確保腳本最後會印出或回傳 `passed,total,score` 格式的字串。</p>
                            <div id="teacher-test-editor" class="w-full h-64 border border-gray-300"></div>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="saveProblem()" id="save-prob-btn" class="bg-blue-600 text-white px-6 py-2 rounded font-bold hover:bg-blue-700">儲存題目</button>
                            <button onclick="cancelEdit()" id="cancel-edit-btn" class="hidden bg-gray-400 text-white px-6 py-2 rounded font-bold hover:bg-gray-500">取消編輯</button>
                        </div>
                    </div>
                </div>
                <div>
                    <h3 class="text-lg font-bold mb-2">現有題目列表</h3>
                    <ul id="teacher-problem-list" class="space-y-2 border p-4 rounded bg-gray-50"></ul>
                </div>
            </div>
        </div>
    </main>

    <!-- 右下角版本資訊 -->
    <div class="fixed bottom-2 right-4 text-xs text-gray-400 font-mono">
        lwh20260330
    </div>

    <div id="teacher-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-lg shadow-lg max-w-sm w-full">
            <h3 class="text-lg font-bold mb-4">請輸入密碼</h3>
            <input type="password" id="teacher-pwd" class="w-full border p-2 rounded mb-4">
            <div class="flex justify-end space-x-2">
                <button onclick="closeTeacherModal()" class="px-4 py-2 bg-gray-200 rounded">取消</button>
                <button onclick="verifyTeacher()" class="px-4 py-2 bg-blue-600 text-white rounded">登入</button>
            </div>
        </div>
    </div>

    <script>
        const MAX_SUBMISSIONS = 5; 
        const FIREBASE_BASE_URL = "https://ktsssprogram-default-rtdb.asia-southeast1.firebasedatabase.app";
        
        let pyodide = null;
        let currentUser = null;
        let currentProblemId = null;
        let editingProblemId = null; // 用於追蹤目前正在編輯的題目 ID
        let dbProblems = {};
        let dbSubmissions = {};

        let studentEditor, teacherDefaultEditor, teacherTestEditor;

        // 預設的初學者測試腳本 (檢查 print 輸出)
        const defaultBeginnerTestScript = `import sys
import io

# 1. 攔截 print 輸出
captured_output = io.StringIO()
sys.stdout = captured_output

# 2. 執行學生程式碼
try:
{STUDENT_CODE}
except Exception:
    pass

# 3. 恢復正常的 print 功能
sys.stdout = sys.__stdout__
student_output = captured_output.getvalue().strip()

# 4. 評分邏輯 (請修改下方的預期答案)
expected_answer = "9.5"

passed = 1 if student_output == expected_answer else 0
score = 100 if passed else 0

f"{passed},1,{score}"`;

        function initEditors() {
            const editorSettings = {
                mode: "ace/mode/python",
                theme: "ace/theme/monokai",
                fontSize: "14px",
                showPrintMargin: false,
                enableBasicAutocompletion: true,
                enableLiveAutocompletion: true
            };

            studentEditor = ace.edit("student-editor");
            studentEditor.setOptions(editorSettings);

            teacherDefaultEditor = ace.edit("teacher-default-editor");
            teacherDefaultEditor.setOptions(editorSettings);
            teacherDefaultEditor.setValue("# 在這裡寫下你的程式碼\n", -1); // 移除 def solve()

            teacherTestEditor = ace.edit("teacher-test-editor");
            teacherTestEditor.setOptions(editorSettings);
            teacherTestEditor.setValue(defaultBeginnerTestScript, -1);
        }

        async function init() {
            initEditors();
            try {
                const [pyodideInstance, probRes, subRes] = await Promise.all([
                    loadPyodide(),
                    fetch(`${FIREBASE_BASE_URL}/problems.json`).then(r => r.json()),
                    fetch(`${FIREBASE_BASE_URL}/submissions.json`).then(r => r.json())
                ]);
                
                pyodide = pyodideInstance;
                dbProblems = probRes || {};
                dbSubmissions = subRes || {};

                document.getElementById('loading-view').classList.add('hidden');
                document.getElementById('login-view').classList.remove('hidden');
            } catch (err) {
                alert("載入系統失敗，請檢查網路連線。");
            }
        }
        init();

        // 回到首頁邏輯
        function goHome() {
            if (currentUser) {
                showView('problem-select-view');
            } else {
                showLogin();
            }
        }

        function showView(viewId) {
            ['login-view', 'problem-select-view', 'student-view', 'teacher-view'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(viewId).classList.remove('hidden');
        }
        function showLogin() { showView('login-view'); currentUser = null; }

        function loginStudent() {
            const cls = document.getElementById('student-class').value.trim();
            const sid = document.getElementById('student-id').value.trim();
            const name = document.getElementById('student-name').value.trim();

            if (!cls || !sid || !name) {
                document.getElementById('login-error').classList.remove('hidden');
                return;
            }

            currentUser = { cls, sid, name, key: `${cls}-${sid}` };
            const infoStr = `${cls} - ${sid} ${name}`;
            document.getElementById('student-info-display-1').innerText = infoStr;
            document.getElementById('student-info-display-2').innerText = infoStr;
            
            renderStudentProblemList();
            showView('problem-select-view');
        }

        function renderStudentProblemList() {
            const listDiv = document.getElementById('problem-list');
            listDiv.innerHTML = '';
            
            if (Object.keys(dbProblems).length === 0) {
                listDiv.innerHTML = '<p class="text-gray-500">老師尚未新增任何題目。</p>';
                return;
            }

            Object.entries(dbProblems).forEach(([pId, prob]) => {
                const subKey = `${currentUser.key}_${pId}`;
                const sub = dbSubmissions[subKey];
                const scoreText = sub ? `最高分: ${sub.maxScore}` : '尚未作答';
                const scoreColor = sub && sub.maxScore === 100 ? 'text-green-600' : 'text-gray-500';

                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 border rounded-lg hover:bg-blue-50 transition flex justify-between items-center";
                btn.innerHTML = `<span class="font-bold text-lg">${prob.title}</span><span class="text-sm font-bold ${scoreColor}">${scoreText}</span>`;
                btn.onclick = () => openProblem(pId);
                listDiv.appendChild(btn);
            });
        }

        function openProblem(pId) {
            currentProblemId = pId;
            const prob = dbProblems[pId];
            const subKey = `${currentUser.key}_${pId}`;
            
            if (!dbSubmissions[subKey]) {
                dbSubmissions[subKey] = { cls: currentUser.cls, sid: currentUser.sid, name: currentUser.name, pId: pId, maxScore: 0, attempts: 0 };
            }

            document.getElementById('problem-title').innerText = prob.title;
            document.getElementById('problem-desc').innerText = prob.desc;
            studentEditor.setValue(prob.defaultCode, -1);
            document.getElementById('result-message').classList.add('hidden');
            
            updateSubmissionCount();
            showView('student-view');
        }

        function updateSubmissionCount() {
            const subKey = `${currentUser.key}_${currentProblemId}`;
            const attempts = dbSubmissions[subKey].attempts;
            const remaining = MAX_SUBMISSIONS - attempts;
            document.getElementById('submission-count').innerText = `剩餘提交次數：${remaining}`;
            
            const btn = document.getElementById('submit-btn');
            if (remaining <= 0) {
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        async function submitCode() {
            const btn = document.getElementById('submit-btn');
            const resultMsg = document.getElementById('result-message');
            const studentCode = studentEditor.getValue();
            const subKey = `${currentUser.key}_${currentProblemId}`;
            const prob = dbProblems[currentProblemId];

            if (dbSubmissions[subKey].attempts >= MAX_SUBMISSIONS) return;

            btn.disabled = true;
            btn.innerText = "測試中...";
            resultMsg.classList.add('hidden');

            // 處理縮排問題：將學生的程式碼每行前面加上 4 個空白，以符合 try 區塊的縮排
            const indentedStudentCode = studentCode.split('\n').map(line => '    ' + line).join('\n');
            const pythonTestScript = prob.testScript.replace('{STUDENT_CODE}', indentedStudentCode);

            try {
                const result = await pyodide.runPythonAsync(pythonTestScript);
                const [passed, total, score] = result.split(',').map(Number);

                dbSubmissions[subKey].attempts += 1;
                if (score > dbSubmissions[subKey].maxScore) {
                    dbSubmissions[subKey].maxScore = score;
                }
                
                await fetch(`${FIREBASE_BASE_URL}/submissions/${subKey}.json`, { method: 'PUT', body: JSON.stringify(dbSubmissions[subKey]) });

                resultMsg.classList.remove('hidden', 'text-red-600', 'text-green-600');
                if (score === 100) {
                    resultMsg.innerText = "✅ 答案正確！得分：100";
                    resultMsg.classList.add('text-green-600');
                } else {
                    resultMsg.innerText = `❌ 答案錯誤 (通過 ${passed}/${total} 個測試)。得分：${score}`;
                    resultMsg.classList.add('text-red-600');
                }
            } catch (err) {
                dbSubmissions[subKey].attempts += 1;
                await fetch(`${FIREBASE_BASE_URL}/submissions/${subKey}.json`, { method: 'PUT', body: JSON.stringify(dbSubmissions[subKey]) });
                
                resultMsg.classList.remove('hidden');
                resultMsg.classList.add('text-red-600');
                resultMsg.innerText = "❌ 程式執行失敗或語法錯誤！得分：0";
            }

            updateSubmissionCount();
            btn.innerText = "提交測試";
        }

        function showTeacherLogin() { document.getElementById('teacher-modal').classList.remove('hidden'); }
        function closeTeacherModal() { document.getElementById('teacher-modal').classList.add('hidden'); document.getElementById('teacher-pwd').value = ''; }
        
        async function verifyTeacher() {
            if (document.getElementById('teacher-pwd').value === 'KTSSS') {
                closeTeacherModal();
                await loadDataAndRender();
                updateTeacherProblemFilter();
                showView('teacher-view');
            } else {
                alert('密碼錯誤');
            }
        }

        function switchTeacherTab(tab) {
            document.getElementById('teacher-tab-grades').classList.add('hidden');
            document.getElementById('teacher-tab-problems').classList.add('hidden');
            document.getElementById('tab-btn-grades').className = "px-4 py-2 bg-gray-200 text-gray-700 rounded-md font-bold hover:bg-gray-300";
            document.getElementById('tab-btn-problems').className = "px-4 py-2 bg-gray-200 text-gray-700 rounded-md font-bold hover:bg-gray-300";

            document.getElementById(`teacher-tab-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-btn-${tab}`).className = "px-4 py-2 bg-blue-600 text-white rounded-md font-bold";
        }

        async function loadDataAndRender() {
            const [probRes, subRes] = await Promise.all([
                fetch(`${FIREBASE_BASE_URL}/problems.json`).then(r => r.json()),
                fetch(`${FIREBASE_BASE_URL}/submissions.json`).then(r => r.json())
            ]);
            dbProblems = probRes || {};
            dbSubmissions = subRes || {};
            renderTeacherTable();
            renderTeacherProblemList();
        }

        function updateTeacherProblemFilter() {
            const filter = document.getElementById('teacher-problem-filter');
            filter.innerHTML = '<option value="all">全部題目</option>';
            Object.entries(dbProblems).forEach(([pId, prob]) => {
                filter.innerHTML += `<option value="${pId}">${prob.title}</option>`;
            });
        }

        function renderTeacherTable() {
            const tbody = document.getElementById('teacher-table-body');
            tbody.innerHTML = '';
            const filterPId = document.getElementById('teacher-problem-filter').value;
            
            let subs = Object.values(dbSubmissions);
            if (filterPId !== 'all') subs = subs.filter(s => s.pId === filterPId);

            subs.sort((a, b) => {
                if (a.cls !== b.cls) return a.cls.localeCompare(b.cls);
                return a.sid.localeCompare(b.sid);
            }).forEach(s => {
                const probTitle = dbProblems[s.pId] ? dbProblems[s.pId].title : '未知題目';
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="py-2 px-4 border-b">${s.cls}</td><td class="py-2 px-4 border-b">${s.sid}</td><td class="py-2 px-4 border-b">${s.name}</td><td class="py-2 px-4 border-b text-gray-600">${probTitle}</td><td class="py-2 px-4 border-b font-bold ${s.maxScore === 100 ? 'text-green-600' : 'text-red-600'}">${s.maxScore}</td><td class="py-2 px-4 border-b">${s.attempts}</td>`;
                tbody.appendChild(tr);
            });
        }

        // 編輯題目功能
        function editProblem(pId) {
            const prob = dbProblems[pId];
            editingProblemId = pId;
            
            document.getElementById('editor-form-title').innerText = "編輯題目";
            document.getElementById('new-prob-title').value = prob.title;
            document.getElementById('new-prob-desc').value = prob.desc;
            teacherDefaultEditor.setValue(prob.defaultCode, -1);
            teacherTestEditor.setValue(prob.testScript, -1);
            
            document.getElementById('save-prob-btn').innerText = "更新題目";
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            
            // 捲動到編輯區
            document.getElementById('problem-editor-section').scrollIntoView({ behavior: 'smooth' });
        }

        function cancelEdit() {
            editingProblemId = null;
            document.getElementById('editor-form-title').innerText = "新增題目";
            document.getElementById('new-prob-title').value = '';
            document.getElementById('new-prob-desc').value = '';
            teacherDefaultEditor.setValue("# 在這裡寫下你的程式碼\n", -1);
            teacherTestEditor.setValue(defaultBeginnerTestScript, -1);
            
            document.getElementById('save-prob-btn').innerText = "儲存題目";
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        }

        async function saveProblem() {
            const title = document.getElementById('new-prob-title').value.trim();
            const desc = document.getElementById('new-prob-desc').value.trim();
            const defaultCode = teacherDefaultEditor.getValue();
            const testScript = teacherTestEditor.getValue();

            if(!title || !desc || !testScript.includes('{STUDENT_CODE}')) {
                alert("請填寫完整資訊，且測試腳本必須包含 {STUDENT_CODE} 標籤！");
                return;
            }

            // 如果正在編輯，則使用原來的 ID，否則產生新 ID
            const pId = editingProblemId ? editingProblemId : 'prob_' + Date.now();
            dbProblems[pId] = { title, desc, defaultCode, testScript };

            await fetch(`${FIREBASE_BASE_URL}/problems/${pId}.json`, { method: 'PUT', body: JSON.stringify(dbProblems[pId]) });

            alert(editingProblemId ? "題目更新成功！" : "題目新增成功！");
            cancelEdit(); // 清空表單並恢復為新增模式
            renderTeacherProblemList();
            updateTeacherProblemFilter();
        }

        function renderTeacherProblemList() {
            const list = document.getElementById('teacher-problem-list');
            list.innerHTML = '';
            Object.entries(dbProblems).forEach(([pId, prob]) => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-center border-b pb-2";
                li.innerHTML = `
                    <span class="font-bold">${prob.title}</span>
                    <div class="space-x-4">
                        <button onclick="editProblem('${pId}')" class="text-blue-600 text-sm hover:underline">編輯</button>
                        <button onclick="deleteProblem('${pId}')" class="text-red-500 text-sm hover:underline">刪除</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        async function deleteProblem(pId) {
            if(confirm("確定要刪除此題目嗎？")) {
                delete dbProblems[pId];
                await fetch(`${FIREBASE_BASE_URL}/problems/${pId}.json`, { method: 'DELETE' });
                if (editingProblemId === pId) cancelEdit();
                renderTeacherProblemList();
                updateTeacherProblemFilter();
                renderTeacherTable();
            }
        }

        async function clearSubmissions() {
            if(confirm('確定要清除所有學生成績嗎？此操作無法復原！')) {
                dbSubmissions = {};
                await fetch(`${FIREBASE_BASE_URL}/submissions.json`, { method: 'DELETE' });
                renderTeacherTable();
            }
        }
    </script>
</body>
</html>
